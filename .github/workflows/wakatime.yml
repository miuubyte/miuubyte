name: WakaTime Readme

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update WakaTime stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TOTAL: true
          TIME_RANGE: all_time
          SHOW_TIME: true
          SHOW_MASKED_TIME: false
          SHOW_TITLE: false
          BLOCKS: ░▒▓█
          LANG_COUNT: 10
          STOP_AT_OTHER: true
          IGNORED_LANGUAGES: "Other,Text,Markdown,JSON,YAML,TOML,Git Config,Properties,XML,Image (svg),INI,Docker,Bash"
          CODE_LANG: txt
          SECTION_NAME: waka
