name: Waka Readme

on:
  # for manual workflow trigger
  workflow_dispatch:
  schedule:
    # runs every 6 hours
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TOTAL: true
          LANG_COUNT: 10
          TIME_RANGE: all_time
          SHOW_TIME: false
          SHOW_MASKED_TIME: false
          SHOW_TITLE: false
          BLOCKS: ⣀⣄⣤⣦⣶⣷⣿
          IGNORED_LANGUAGES: "Other,Text,Markdown,JSON,YAML,TOML,GitConfig,Properties,XML,Image(svg),INI,Docker,Bash,txt,EJS,CSS"
          COMMIT_MESSAGE: 'feat(workflow): update Waka readme!'
